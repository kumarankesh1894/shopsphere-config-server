server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://authservice
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: lb://authservice
          predicates:
            - Path=/api/users/**
        - id: admin-service
          uri: lb://adminservice
          predicates:
            - Path=/api/admin/**
        - id: catalog-service
          uri: lb://catalogservice
          predicates:
            - Path=/api/catalog/**
        - id: order-service
          uri: lb://orderservice
          predicates:
            - Path=/api/cart/**, /api/checkout/**, /api/orders/**
        - id: payment-service
          uri: lb://paymentservice
          predicates:
            - Path=/api/payments/internal/**



jwt:
  secret: ${JWT_SECRET:pbIe6IBR1Ed3hkGsrHQ3B7VkngAbzTuc5zVhdz9rEsg}


logging:
  level:
    root: INFO

