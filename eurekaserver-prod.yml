server:
  port: 8761

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
  server:
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 30000

logging:
  level:
    root: WARN

